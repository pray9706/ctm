<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Registration - Step 1 | Civic Tech Moncton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-slate-800">

    <header class="w-full bg-white border-b border-slate-200 py-4 px-6 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="img/CTM_Logo.png" alt="Civic Tech Moncton Logo" class="h-9 object-contain">
            <span class="font-bold text-sm uppercase tracking-wider text-slate-700 hidden sm:inline">Volunteer Application</span>
        </div>
        <div class="flex items-center gap-4 text-xs font-semibold text-slate-400">
            <span class="text-blue-600 font-bold border-b-2 border-blue-600 pb-4 pt-4">1. Basic Info</span>
            <span><i class="fa-solid fa-chevron-right text-[10px]"></i></span>
            <span>2. Identity Verification</span>
            <span><i class="fa-solid fa-chevron-right text-[10px]"></i></span>
            <span>3. Success</span>
        </div>
    </header>

    <main class="flex-grow max-w-3xl w-full mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-6 md:p-10 space-y-8">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Apply as a Volunteer</h1>
                <p class="text-slate-500 text-sm mt-1">Please provide your details to begin the onboarding and digital verification process.</p>
            </div>

            <form action="Reg-2.html" class="space-y-6">
                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-blue-600 uppercase tracking-wider border-b border-slate-100 pb-2">Required Information</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Full Name *</label>
                            <input type="text" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition" placeholder="e.g. Rui Pan">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Email Address *</label>
                            <input type="email" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition" placeholder="you@example.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Core Skills (Tech or Non-Tech) *</label>
                        <textarea required rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition" placeholder="e.g. Frontend Dev (React), UX Design, Project Management, Copywriting, Community Outreach..."></textarea>
                    </div>
                </div>

                <div class="space-y-4 pt-4">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-2">Optional Information</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Educational Background</label>
                            <input type="text" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition" placeholder="College/University, Degree">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Current Employment / Industry</label>
                            <input type="text" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition" placeholder="Current role or field of work">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Skills Certification Link or Details</label>
                        <input type="text" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition" placeholder="e.g. AWS Certified, PMP, GitHub Profile Link">
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100">
                    <div class="flex items-start gap-3 p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <input type="checkbox" required class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 mt-0.5">
                        <label class="text-xs text-slate-600 leading-relaxed">
                            I verify that all information provided is accurate. I acknowledge and agree to comply with Civic Tech Moncton's <a href="#" class="text-blue-600 font-semibold hover:underline">Code of Conduct</a>, data safety policies, and volunteer management frameworks. *
                        </label>
                    </div>
                </div>

                <div class="pt-4 flex items-center justify-end">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md shadow-blue-100 transition-all active:scale-98 text-sm flex items-center gap-2">
                        Continue to Verification <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="w-full text-center py-6 text-xs text-slate-400 border-t border-slate-200 bg-white">
        &copy; 2026 Civic Tech Moncton. All rights reserved.
    </footer>

</body>
</html>
