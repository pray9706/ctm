<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Civic Tech Moncton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
        }
        .font-lato {
            font-family: 'Lato', sans-serif;
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-600 selection:text-white bg-gradient-to-b from-[#b9ddff]/40 via-white to-white min-h-screen flex flex-col justify-between">

    <!-- 顶部极简导航（仅保留返回主页与语言，防止用户迷失） -->
    <header class="w-full bg-transparent">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group">
                <i class="fa-solid fa-arrow-left text-slate-500 group-hover:text-blue-600 transition-colors text-sm"></i>
                <span class="text-sm font-semibold text-slate-600 group-hover:text-blue-600 transition-colors">Back to Home</span>
            </a>
            <div>
                <button class="text-xs font-semibold border border-blue-200/60 bg-white/50 hover:bg-white text-slate-700 px-4 py-2 rounded-full transition">
                    English / Français
                </button>
            </div>
        </div>
    </header>

    <!-- 登录核心卡片区域 -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-blue-200/20 p-8 sm:p-10 relative overflow-hidden">
            
            <!-- 视觉微点缀，呼应主页蓝色调 -->
            <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-500 to-blue-700"></div>

            <!-- 头部 Logo 与标题 -->
            <div class="text-center space-y-3 mb-8">
                <div class="flex justify-center mb-4">
                    <img src="img/CTM_Logo.png" alt="Civic Tech Moncton Logo" class="h-12 object-contain">
                </div>
                <h2 class="text-2xl font-black text-[#1e3a8a] tracking-tight">Welcome Back</h2>
                <p class="text-xs text-slate-500 font-lato">Sign in to access your volunteer dashboard and project staging</p>
            </div>

            <!-- 登录表单 -->
            <form action="#" method="POST" class="space-y-5">
                
                <!-- 邮箱输入框 -->
                <div class="space-y-1.5">
                    <label for="email" class="text-xs font-bold text-slate-700 tracking-wide uppercase">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-regular fa-envelope text-sm"></i>
                        </div>
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder="name@example.com"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-600 focus:bg-white transition-all placeholder:text-slate-400 text-slate-800">
                    </div>
                </div>

                <!-- 密码输入框 -->
                <div class="space-y-1.5">
                    <div class="flex justify-between items-center">
                        <label for="password" class="text-xs font-bold text-slate-700 tracking-wide uppercase">Password</label>
                        <a href="forgot-password.html" class="text-xs font-semibold text-blue-600 hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </div>
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-600 focus:bg-white transition-all placeholder:text-slate-400 text-slate-800">
                    </div>
                </div>

                <!-- 记住我选项 -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember-me" name="remember-me" 
                        class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 accent-blue-600 cursor-pointer">
                    <label for="remember-me" class="ml-2 text-xs font-medium text-slate-600 select-none cursor-pointer">
                        Remember this device
                    </label>
                </div>

                <!-- 登录提交按钮 -->
                <div class="pt-2">
                    <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-3 px-4 rounded-xl shadow-md transition-all active:scale-[0.99] flex items-center justify-center gap-2">
                        Sign In <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </form>

            <!-- 注册引导底栏 -->
            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-500">
                    New to the community? 
                    <a href="Reg-1.html" class="text-blue-600 font-bold hover:underline ml-1">Join Our Team</a>
                </p>
            </div>

        </div>
    </main>

    <!-- 极简页脚 -->
    <footer class="py-6 text-center text-[11px] text-slate-400 font-medium">
        <p>&copy; 2026 Civic Tech Moncton. All rights reserved.</p>
    </footer>
	<!-- >>> 在这里添加以下 JavaScript 代码 <<< -->
    <script>
        // 1. 获取表单元素
        const loginForm = document.querySelector('form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // 2. 监听表单提交事件
        loginForm.addEventListener('submit', function(event) {
            // 阻止表单的默认刷新提交行为
            event.preventDefault();

            // 3. 基础输入检测（去除前后空格）
            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value.trim();

            if (!emailValue || !passwordValue) {
                alert('Please fill in all fields.');
                return;
            }

            // 示例检测：密码不能少于6位
            if (passwordValue.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }

            // 4. 检测通过，模拟登录成功并跳转到 profile.html
            // 如果后续有后端 API，这里会替换为 fetch() 请求
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
